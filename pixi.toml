[workspace]
authors = ["Joshua A. Anderson <joaander@umich.edu>"]
channels = ["conda-forge"]
name = "hoomd-blue"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[tasks]

[dependencies]
cereal = "*"
cmake = "*"
eigen = "*"
gsd = "*"
h5py = "*"
ninja = "*"
numpy = "*"
mpi4py = "*"
openmpi = "*"
pybind11 = "*"
pytest = "*"
rowan = "*"
sybil = "*"
bump-my-version = "*"

[feature.py310.dependencies]
python = "3.10.*"
[feature.py311.dependencies]
python = "3.11.*"
[feature.py312.dependencies]
python = "3.12.*"
[feature.py313.dependencies]
python = "3.13.*"

[environments]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
